<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Momentum</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1C1814" />
    <meta name="apple-mobile-web-app-capable" content="true" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- SPLASH -->
    <div class="splash" id="splash">
      <div class="splash-inner">
        <div class="splash-mark">M</div>
        <p class="splash-label">Momentum</p>
        <div class="splash-loader">
          <div class="splash-loader-fill"></div>
        </div>
      </div>
    </div>

    <!-- GRAIN OVERLAY -->
    <div class="grain" aria-hidden="true"></div>

    <!-- BG BLOBS -->
    <div class="blob blob-1" aria-hidden="true"></div>
    <div class="blob blob-2" aria-hidden="true"></div>

    <div class="shell">
      <!-- HEADER -->
      <header class="header">
        <div class="header-top">
          <div class="logo-group">
            <span class="logo-dot"></span>
            <span class="logo-name">Momentum</span>
          </div>
          <div class="progress-ring-wrap" title="Tasks completed">
            <svg
              class="progress-ring"
              width="40"
              height="40"
              viewBox="0 0 40 40"
            >
              <circle class="ring-track" cx="20" cy="20" r="16" />
              <circle class="ring-fill" id="ringFill" cx="20" cy="20" r="16" />
            </svg>
            <span class="ring-label" id="ringLabel">0</span>
          </div>
        </div>

        <!-- DATE + GREETING -->
        <div class="greeting-block">
          <h1 class="greeting-title" id="greeting">Good morning</h1>
          <p class="greeting-date" id="dateLabel"></p>
        </div>

        <!-- MOTIVATIONAL NOTE -->
        <div class="note-wrap">
          <div class="note-pen">✦</div>
          <p
            class="note-text"
            id="motivationalNote"
            contenteditable="true"
            spellcheck="false"
          ></p>
        </div>
      </header>

      <!-- INPUT -->
      <div class="input-row">
        <form class="input-form" id="todoForm">
          <input
            type="text"
            id="todoInput"
            class="task-input"
            placeholder="Add a new task…"
            autocomplete="off"
            required
          />
          <button type="submit" class="btn-add" aria-label="Add task">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
          </button>
        </form>
      </div>

      <!-- FILTER TABS -->
      <div class="filter-tabs">
        <button class="tab active" data-filter="all">All</button>
        <button class="tab" data-filter="active">Active</button>
        <button class="tab" data-filter="done">Done</button>
      </div>

      <!-- STATS ROW -->
      <div class="stats-row">
        <div class="stat">
          <span class="stat-num" id="statTotal">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat">
          <span class="stat-num" id="statDone">0</span>
          <span class="stat-label">Done</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat">
          <span class="stat-num" id="statLeft">0</span>
          <span class="stat-label">Left</span>
        </div>
        <button
          class="btn-clear-done"
          id="clearDoneBtn"
          title="Clear completed tasks"
        >
          <svg
            width="12"
            height="12"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" />
          </svg>
          Clear done
        </button>
      </div>

      <!-- TASK LIST -->
      <ul class="task-list" id="todoList"></ul>

      <!-- EMPTY STATE -->
      <div class="empty-state" id="emptyState">
        <p class="empty-icon">◎</p>
        <p class="empty-text">
          Your list is clear.<br /><em>Add something to get going.</em>
        </p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>

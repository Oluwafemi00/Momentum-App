<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Momentum</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="splash-screen" class="splash-screen">
      <svg width="80" height="80" viewBox="0 0 512 512">
        <defs>
          <linearGradient
            id="splash-gradient"
            x1="0%"
            y1="0%"
            x2="100%"
            y2="100%"
          >
            <stop offset="0%" style="stop-color: #6366f1; stop-opacity: 1" />
            <stop offset="100%" style="stop-color: #a855f7; stop-opacity: 1" />
          </linearGradient>
        </defs>
        <rect width="512" height="512" rx="120" fill="url(#splash-gradient)" />
        <path
          d="M152 268 L224 340 L360 180"
          fill="none"
          stroke="#ffffff"
          stroke-width="56"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
      <div class="loader"></div>
    </div>
    <div class="bg-shape"></div>

    <main class="app-container">
      <header>
        <h1>Momentum</h1>
        <div
          class="motivational-note-container"
          title="Click to edit your motivation"
        >
          <p
            id="motivational-note"
            contenteditable="true"
            spellcheck="false"
          ></p>
        </div>
      </header>

      <form id="todo-form" class="input-group">
        <input
          type="text"
          id="todo-input"
          placeholder="What needs to be done?"
          autocomplete="off"
          required
        />
        <button type="submit" class="btn-primary" aria-label="Add task">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </form>

      <ul id="todo-list" class="todo-list"></ul>
    </main>

    <script src="script.js"></script>
  </body>
</html>
